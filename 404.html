<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found - Arun Malik</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/manifest.json">
    <style>
        :root {
            --bg: #ffffff; --bg-secondary: #f9fafb; --text: #111827;
            --text-secondary: #6b7280; --accent: #2563eb; --border: #e5e7eb;
            --max-width: 680px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --bg-secondary: #1e293b; --text: #f1f5f9;
            --text-secondary: #94a3b8; --accent: #60a5fa; --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: var(--max-width); margin: 0 auto; padding: 0 1.5rem; width: 100%; }
        header { padding: 3rem 0 2rem; border-bottom: 1px solid var(--border); }
        .site-nav { display: flex; align-items: center; justify-content: space-between; }
        .site-name { font-size: 1.125rem; font-weight: 700; color: var(--text); text-decoration: none; }
        .site-name:hover { color: var(--accent); }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; font-weight: 500; }
        .nav-links a:hover { color: var(--text); }
        main { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 4rem 0; }
        .error-code { font-size: 5rem; font-weight: 800; color: var(--border); letter-spacing: -0.05em; margin-bottom: 1rem; }
        .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
        .error-desc { color: var(--text-secondary); font-size: 1rem; margin-bottom: 2rem; }
        .error-links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
        .error-links a {
            font-size: 0.9rem; font-weight: 500; color: var(--accent);
            text-decoration: none; padding: 0.5rem 1.25rem;
            border: 1px solid var(--accent); border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }
        .error-links a:hover { background: var(--accent); color: #fff; }
        footer { padding: 2rem 0; border-top: 1px solid var(--border); text-align: center; }
        footer p { font-size: 0.8125rem; color: var(--text-secondary); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <nav class="site-nav">
                <a href="/" class="site-name">Arun Malik</a>
                <div class="nav-links">
                    <a href="/posts/">Writing</a>
                    <a href="/series/">Series</a>
                    <a href="/about/">About</a>
                    <a href="/contact/">Contact</a>
                </div>
            </nav>
        </header>
    </div>

    <main>
        <div>
            <div class="error-code">404</div>
            <h1 class="error-title">Page not found</h1>
            <p class="error-desc">The page you are looking for does not exist or has been moved.</p>
            <div class="error-links">
                <a href="/">Home</a>
                <a href="/posts/">Writing</a>
                <a href="/series/">Series</a>
            </div>
        </div>
    </main>

    <div class="container">
        <footer>
            <p>&copy; 2026 Arun Malik</p>
        </footer>
    </div>

    <script>
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const saved = localStorage.getItem('theme');
        if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <script src="/assets/nav-active.js"></script>
</body>
</html>
