<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0f172a"/>
<!-- Central orchestrator -->
<circle cx="600" cy="315" r="40" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.8"/>
<circle cx="600" cy="315" r="15" fill="#ef4444" opacity="0.6"/>
<!-- Agent nodes -->
<g fill="none" stroke-width="2" opacity="0.7">
  <circle cx="400" cy="180" r="28" stroke="#f87171"/>
  <circle cx="800" cy="180" r="28" stroke="#f87171"/>
  <circle cx="400" cy="450" r="28" stroke="#f87171"/>
  <circle cx="800" cy="450" r="28" stroke="#f87171"/>
  <circle cx="250" cy="315" r="25" stroke="#fca5a5"/>
  <circle cx="950" cy="315" r="25" stroke="#fca5a5"/>
</g>
<!-- Agent labels (small shapes inside) -->
<g fill="#f87171" opacity="0.6">
  <rect x="390" y="172" width="20" height="16" rx="3"/>
  <polygon points="800,168 810,180 790,180"/>
  <circle cx="400" cy="450" r="8"/>
  <rect x="790" y="442" width="20" height="16" rx="3"/>
</g>
<!-- Connection lines (data flow) -->
<g stroke="#ef4444" stroke-width="1.5" opacity="0.4">
  <line x1="600" y1="315" x2="400" y2="180"/><line x1="600" y1="315" x2="800" y2="180"/>
  <line x1="600" y1="315" x2="400" y2="450"/><line x1="600" y1="315" x2="800" y2="450"/>
  <line x1="600" y1="315" x2="250" y2="315"/><line x1="600" y1="315" x2="950" y2="315"/>
</g>
<!-- Resolution flow arrows (animated feel) -->
<g fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.5" stroke-dasharray="6,4">
  <path d="M250,315 L400,180 L600,315 L800,450 L950,315"/>
</g>
<!-- Incident indicator (flash) -->
<g fill="#fbbf24" opacity="0.3">
  <polygon points="600,50 610,80 640,80 615,100 625,130 600,110 575,130 585,100 560,80 590,80"/>
</g>
</svg>
