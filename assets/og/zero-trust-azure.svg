<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0f172a"/>
<!-- Concentric defense layers -->
<g fill="none" stroke-width="2">
  <rect x="350" y="115" width="500" height="400" rx="12" stroke="#059669" opacity="0.3"/>
  <rect x="400" y="155" width="400" height="320" rx="10" stroke="#10b981" opacity="0.4"/>
  <rect x="450" y="195" width="300" height="240" rx="8" stroke="#34d399" opacity="0.5"/>
  <rect x="500" y="235" width="200" height="160" rx="6" stroke="#6ee7b7" opacity="0.6"/>
</g>
<!-- Core asset -->
<rect x="560" y="285" width="80" height="60" rx="8" fill="#059669" opacity="0.8"/>
<g fill="#d1fae5">
  <rect x="575" y="300" width="50" height="8" rx="2" opacity="0.6"/>
  <rect x="575" y="315" width="35" height="8" rx="2" opacity="0.6"/>
  <rect x="575" y="330" width="45" height="8" rx="2" opacity="0.6"/>
</g>
<!-- Checkpoints (locks on each layer) -->
<g fill="#10b981" opacity="0.7">
  <circle cx="600" cy="115" r="10"/><circle cx="350" cy="315" r="10"/><circle cx="850" cy="315" r="10"/>
  <circle cx="600" cy="515" r="10"/><circle cx="400" cy="155" r="8"/><circle cx="800" cy="155" r="8"/>
</g>
<!-- Verify arrows -->
<g fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3">
  <path d="M200,315 L340,315"/><path d="M860,315 L1000,315"/>
  <path d="M600,50 L600,105"/><path d="M600,525 L600,580"/>
</g>
<!-- "Never Trust" X marks outside -->
<g stroke="#ef4444" stroke-width="2" opacity="0.3">
  <line x1="150" y1="150" x2="170" y2="170"/><line x1="170" y1="150" x2="150" y2="170"/>
  <line x1="1030" y1="450" x2="1050" y2="470"/><line x1="1050" y1="450" x2="1030" y2="470"/>
</g>
</svg>
