<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0f172a"/>

<!-- Golden spiral (large, elegant) -->
<g fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.5">
  <path d="M600,315 A144,144 0 0,1 456,315"/>
  <path d="M456,315 A89,89 0 0,1 456,226"/>
  <path d="M456,226 A55,55 0 0,1 511,226"/>
  <path d="M511,226 A34,34 0 0,1 511,260"/>
  <path d="M511,260 A21,21 0 0,1 490,260"/>
  <path d="M490,260 A13,13 0 0,1 490,247"/>
</g>
<!-- Larger outer spiral -->
<g fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.3">
  <path d="M600,315 A233,233 0 0,1 367,315"/>
  <path d="M367,315 A144,144 0 0,1 367,171"/>
  <path d="M367,171 A89,89 0 0,1 456,171"/>
  <path d="M456,171 A55,55 0 0,1 456,226"/>
</g>

<!-- Concentric circles radiating from golden point -->
<g fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.2">
  <circle cx="500" cy="260" r="50"/>
  <circle cx="500" cy="260" r="100"/>
  <circle cx="500" cy="260" r="160"/>
  <circle cx="500" cy="260" r="230"/>
  <circle cx="500" cy="260" r="310"/>
</g>

<!-- Radiating lines from center (like a compass or sun) -->
<g stroke="#3b82f6" stroke-width="0.6" opacity="0.15">
  <line x1="500" y1="260" x2="900" y2="100"/>
  <line x1="500" y1="260" x2="1000" y2="200"/>
  <line x1="500" y1="260" x2="1050" y2="315"/>
  <line x1="500" y1="260" x2="1000" y2="430"/>
  <line x1="500" y1="260" x2="900" y2="520"/>
  <line x1="500" y1="260" x2="750" y2="580"/>
  <line x1="500" y1="260" x2="200" y2="50"/>
  <line x1="500" y1="260" x2="100" y2="200"/>
  <line x1="500" y1="260" x2="50" y2="350"/>
  <line x1="500" y1="260" x2="150" y2="530"/>
  <line x1="500" y1="260" x2="350" y2="600"/>
</g>

<!-- Floating geometric shapes (scattered, like ideas) -->
<g fill="none" stroke="#60a5fa" stroke-width="1.2" opacity="0.35">
  <polygon points="850,150 880,130 910,150 910,180 880,200 850,180"/>
  <polygon points="950,350 975,335 1000,350 1000,375 975,390 950,375"/>
  <polygon points="150,450 172,438 194,450 194,472 172,484 150,472"/>
  <rect x="1000" y="450" width="35" height="35" rx="4" transform="rotate(15 1017 467)"/>
  <circle cx="800" cy="480" r="18"/>
  <rect x="100" y="130" width="30" height="30" rx="3" transform="rotate(-10 115 145)"/>
</g>

<!-- Subtle fills on some shapes -->
<g fill="#2563eb" opacity="0.08">
  <polygon points="850,150 880,130 910,150 910,180 880,200 850,180"/>
  <circle cx="800" cy="480" r="18"/>
  <polygon points="150,450 172,438 194,450 194,472 172,484 150,472"/>
</g>

<!-- Dots at intersections (nodes of knowledge) -->
<g fill="#60a5fa" opacity="0.5">
  <circle cx="500" cy="260" r="5"/>
  <circle cx="600" cy="315" r="3"/>
  <circle cx="456" cy="315" r="3"/>
  <circle cx="456" cy="226" r="3"/>
  <circle cx="511" cy="226" r="2.5"/>
  <circle cx="511" cy="260" r="2"/>
  <circle cx="367" cy="315" r="2.5"/>
  <circle cx="367" cy="171" r="2"/>
  <circle cx="456" cy="171" r="2"/>
</g>

<!-- More scattered particles -->
<g fill="#93c5fd" opacity="0.3">
  <circle cx="700" cy="200" r="2"/><circle cx="780" cy="280" r="1.5"/>
  <circle cx="650" cy="400" r="2"/><circle cx="900" cy="250" r="1.5"/>
  <circle cx="1100" cy="150" r="2"/><circle cx="1050" cy="500" r="1.5"/>
  <circle cx="300" cy="100" r="1.5"/><circle cx="200" cy="300" r="2"/>
  <circle cx="350" cy="500" r="1.5"/><circle cx="750" cy="550" r="2"/>
  <circle cx="1000" cy="100" r="1.5"/><circle cx="550" cy="500" r="2"/>
</g>

<!-- Subtle flowing curves (elegance) -->
<g fill="none" stroke="#1d4ed8" stroke-width="1" opacity="0.12">
  <path d="M0,500 Q300,450 600,480 T1200,420"/>
  <path d="M0,150 Q400,100 700,160 T1200,120"/>
</g>
</svg>
