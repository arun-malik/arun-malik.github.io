<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0f172a"/>

<!-- Neural network layers (left to right, representing AI/deep learning) -->
<!-- Input layer -->
<g fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.6">
  <circle cx="150" cy="150" r="12"/>
  <circle cx="150" cy="250" r="12"/>
  <circle cx="150" cy="350" r="12"/>
  <circle cx="150" cy="450" r="12"/>
</g>
<!-- Hidden layer 1 -->
<g fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.6">
  <circle cx="350" cy="130" r="14"/>
  <circle cx="350" cy="230" r="14"/>
  <circle cx="350" cy="330" r="14"/>
  <circle cx="350" cy="430" r="14"/>
  <circle cx="350" cy="530" r="14"/>
</g>
<!-- Hidden layer 2 (central - largest, most prominent) -->
<g fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.7">
  <circle cx="580" cy="160" r="18"/>
  <circle cx="580" cy="280" r="18"/>
  <circle cx="580" cy="400" r="18"/>
  <circle cx="580" cy="520" r="18"/>
</g>
<!-- Hidden layer 3 -->
<g fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6">
  <circle cx="800" cy="180" r="15"/>
  <circle cx="800" cy="300" r="15"/>
  <circle cx="800" cy="420" r="15"/>
</g>
<!-- Output layer (agents/actions) -->
<g fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.6">
  <circle cx="1020" cy="220" r="16"/>
  <circle cx="1020" cy="350" r="16"/>
  <circle cx="1020" cy="480" r="16"/>
</g>

<!-- Connections (neural pathways) - input to hidden1 -->
<g stroke="#3b82f6" stroke-width="0.6" opacity="0.15">
  <line x1="162" y1="150" x2="336" y2="130"/><line x1="162" y1="150" x2="336" y2="230"/>
  <line x1="162" y1="150" x2="336" y2="330"/>
  <line x1="162" y1="250" x2="336" y2="130"/><line x1="162" y1="250" x2="336" y2="230"/>
  <line x1="162" y1="250" x2="336" y2="330"/><line x1="162" y1="250" x2="336" y2="430"/>
  <line x1="162" y1="350" x2="336" y2="230"/><line x1="162" y1="350" x2="336" y2="330"/>
  <line x1="162" y1="350" x2="336" y2="430"/><line x1="162" y1="350" x2="336" y2="530"/>
  <line x1="162" y1="450" x2="336" y2="330"/><line x1="162" y1="450" x2="336" y2="430"/>
  <line x1="162" y1="450" x2="336" y2="530"/>
</g>
<!-- hidden1 to hidden2 -->
<g stroke="#6366f1" stroke-width="0.7" opacity="0.18">
  <line x1="364" y1="130" x2="562" y2="160"/><line x1="364" y1="130" x2="562" y2="280"/>
  <line x1="364" y1="230" x2="562" y2="160"/><line x1="364" y1="230" x2="562" y2="280"/>
  <line x1="364" y1="230" x2="562" y2="400"/>
  <line x1="364" y1="330" x2="562" y2="280"/><line x1="364" y1="330" x2="562" y2="400"/>
  <line x1="364" y1="430" x2="562" y2="280"/><line x1="364" y1="430" x2="562" y2="400"/>
  <line x1="364" y1="430" x2="562" y2="520"/>
  <line x1="364" y1="530" x2="562" y2="400"/><line x1="364" y1="530" x2="562" y2="520"/>
</g>
<!-- hidden2 to hidden3 -->
<g stroke="#8b5cf6" stroke-width="0.8" opacity="0.2">
  <line x1="598" y1="160" x2="785" y2="180"/><line x1="598" y1="160" x2="785" y2="300"/>
  <line x1="598" y1="280" x2="785" y2="180"/><line x1="598" y1="280" x2="785" y2="300"/>
  <line x1="598" y1="280" x2="785" y2="420"/>
  <line x1="598" y1="400" x2="785" y2="300"/><line x1="598" y1="400" x2="785" y2="420"/>
  <line x1="598" y1="520" x2="785" y2="420"/>
</g>
<!-- hidden3 to output -->
<g stroke="#a78bfa" stroke-width="0.8" opacity="0.2">
  <line x1="815" y1="180" x2="1004" y2="220"/><line x1="815" y1="180" x2="1004" y2="350"/>
  <line x1="815" y1="300" x2="1004" y2="220"/><line x1="815" y1="300" x2="1004" y2="350"/>
  <line x1="815" y1="300" x2="1004" y2="480"/>
  <line x1="815" y1="420" x2="1004" y2="350"/><line x1="815" y1="420" x2="1004" y2="480"/>
</g>

<!-- Node fills (subtle glow) -->
<g fill="#3b82f6" opacity="0.15">
  <circle cx="150" cy="150" r="12"/><circle cx="150" cy="250" r="12"/>
  <circle cx="150" cy="350" r="12"/><circle cx="150" cy="450" r="12"/>
</g>
<g fill="#6366f1" opacity="0.12">
  <circle cx="350" cy="130" r="14"/><circle cx="350" cy="230" r="14"/>
  <circle cx="350" cy="330" r="14"/><circle cx="350" cy="430" r="14"/>
  <circle cx="350" cy="530" r="14"/>
</g>
<g fill="#8b5cf6" opacity="0.15">
  <circle cx="580" cy="160" r="18"/><circle cx="580" cy="280" r="18"/>
  <circle cx="580" cy="400" r="18"/><circle cx="580" cy="520" r="18"/>
</g>
<g fill="#a78bfa" opacity="0.12">
  <circle cx="800" cy="180" r="15"/><circle cx="800" cy="300" r="15"/>
  <circle cx="800" cy="420" r="15"/>
</g>
<g fill="#c4b5fd" opacity="0.15">
  <circle cx="1020" cy="220" r="16"/><circle cx="1020" cy="350" r="16"/>
  <circle cx="1020" cy="480" r="16"/>
</g>

<!-- Data flow pulses (bright dots moving along connections) -->
<g fill="#60a5fa" opacity="0.7">
  <circle cx="250" cy="190" r="3"/>
  <circle cx="460" cy="210" r="3"/>
  <circle cx="690" cy="240" r="3"/>
  <circle cx="910" cy="290" r="3"/>
</g>
<g fill="#a78bfa" opacity="0.6">
  <circle cx="270" cy="380" r="2.5"/>
  <circle cx="470" cy="450" r="2.5"/>
  <circle cx="700" cy="380" r="2.5"/>
  <circle cx="900" cy="430" r="2.5"/>
</g>

<!-- Cloud infrastructure layers (subtle horizontal lines at bottom) -->
<g stroke="#1e3a5f" stroke-width="1" opacity="0.2">
  <line x1="50" y1="580" x2="1150" y2="580"/>
  <line x1="80" y1="600" x2="1120" y2="600"/>
  <line x1="110" y1="620" x2="1090" y2="620"/>
</g>

<!-- Floating hexagons (distributed systems) -->
<g fill="none" stroke="#1d4ed8" stroke-width="0.8" opacity="0.15">
  <polygon points="70,80 90,68 110,80 110,100 90,112 70,100"/>
  <polygon points="1100,530 1120,518 1140,530 1140,550 1120,562 1100,550"/>
</g>
</svg>
