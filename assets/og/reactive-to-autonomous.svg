<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0f172a"/>
<!-- Evolution timeline -->
<line x1="150" y1="400" x2="1050" y2="400" stroke="#d97706" stroke-width="2" opacity="0.4"/>
<!-- Five generations (circles growing in sophistication) -->
<g fill="none" stroke-width="2">
  <circle cx="200" cy="350" r="25" stroke="#92400e" opacity="0.5"/>
  <circle cx="400" cy="320" r="35" stroke="#b45309" opacity="0.6"/>
  <circle cx="600" cy="280" r="45" stroke="#d97706" opacity="0.7"/>
  <circle cx="800" cy="230" r="55" stroke="#f59e0b" opacity="0.8"/>
  <circle cx="1000" cy="170" r="65" stroke="#fbbf24" opacity="0.9"/>
</g>
<!-- Rising arrow path -->
<path d="M200,350 Q400,300 600,280 T1000,170" fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="0.6"/>
<!-- Labels: manual to autonomous (dots getting brighter) -->
<g fill="#d97706">
  <circle cx="200" cy="350" r="6" opacity="0.3"/>
  <circle cx="400" cy="320" r="7" opacity="0.4"/>
  <circle cx="600" cy="280" r="8" opacity="0.6"/>
  <circle cx="800" cy="230" r="9" opacity="0.8"/>
  <circle cx="1000" cy="170" r="10" opacity="1.0"/>
</g>
<!-- Human icon (left, fading out) -->
<g fill="none" stroke="#92400e" stroke-width="1.5" opacity="0.5" transform="translate(180,420)">
  <circle cx="20" cy="10" r="8"/><path d="M8,35 Q8,22 20,22 Q32,22 32,35"/>
</g>
<!-- AI icon (right, prominent) -->
<g fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.8" transform="translate(975,230)">
  <polygon points="25,0 50,15 50,45 25,60 0,45 0,15"/>
  <circle cx="25" cy="30" r="10"/>
</g>
<!-- Time arrow -->
<path d="M1040,400 L1060,400 L1055,395 M1060,400 L1055,405" fill="none" stroke="#d97706" stroke-width="2" opacity="0.6"/>
</svg>
