<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0f172a"/>
<!-- Abstract background texture -->
<g fill="none" stroke="#164e63" stroke-width="0.5" opacity="0.3">
  <ellipse cx="600" cy="315" rx="500" ry="280" transform="rotate(8 600 315)"/>
  <ellipse cx="600" cy="315" rx="450" ry="250" transform="rotate(-12 600 315)"/>
  <ellipse cx="600" cy="315" rx="400" ry="220" transform="rotate(20 600 315)"/>
</g>
<!-- Stream A (cyan): flowing from upper-left toward center-right -->
<g fill="none" stroke="#06b6d4" stroke-width="2.5" opacity="0.6">
  <path d="M80,150 Q250,130 400,200 Q550,270 700,290 Q800,300 900,310"/>
  <path d="M120,190 Q280,180 420,240 Q560,300 700,320 Q800,330 880,330"/>
  <path d="M60,110 Q220,80 380,160 Q530,240 680,260 Q780,270 900,290"/>
</g>
<!-- Stream B (purple): flowing from lower-left toward center-right -->
<g fill="none" stroke="#8b5cf6" stroke-width="2.5" opacity="0.6">
  <path d="M80,480 Q250,500 400,430 Q550,360 700,340 Q800,330 900,320"/>
  <path d="M120,440 Q280,450 420,390 Q560,330 700,320 Q800,315 880,315"/>
  <path d="M60,520 Q220,550 380,470 Q530,390 680,370 Q780,350 900,340"/>
</g>
<!-- Convergence zone: where streams merge into unified flow -->
<g fill="none" stroke="#e2e8f0" stroke-width="1.5" opacity="0.4">
  <circle cx="920" cy="315" r="60"/>
  <circle cx="920" cy="315" r="40"/>
  <circle cx="920" cy="315" r="20"/>
</g>
<!-- Unified output flowing right -->
<g fill="none" stroke="#e2e8f0" stroke-width="2" opacity="0.5">
  <path d="M980,315 Q1050,310 1120,300"/>
  <path d="M980,320 Q1050,325 1120,330"/>
</g>
<!-- Scattered energy particles -->
<g fill="#06b6d4" opacity="0.3">
  <circle cx="200" cy="100" r="3"/><circle cx="350" cy="170" r="2"/><circle cx="500" cy="230" r="3"/>
  <circle cx="150" cy="160" r="2"/><circle cx="450" cy="190" r="2"/>
</g>
<g fill="#8b5cf6" opacity="0.3">
  <circle cx="200" cy="530" r="3"/><circle cx="350" cy="460" r="2"/><circle cx="500" cy="400" r="3"/>
  <circle cx="150" cy="470" r="2"/><circle cx="450" cy="440" r="2"/>
</g>
<g fill="#e2e8f0" opacity="0.2">
  <circle cx="950" cy="280" r="2"/><circle cx="1000" cy="350" r="2"/>
  <circle cx="1060" cy="300" r="3"/><circle cx="1100" cy="340" r="2"/>
</g>
<!-- Subtle geometric accents -->
<g fill="none" stroke="#0e7490" stroke-width="0.8" opacity="0.15">
  <polygon points="50,50 120,30 140,90 80,110"/>
  <polygon points="1080,540 1140,520 1160,580 1100,590"/>
</g>
</svg>
