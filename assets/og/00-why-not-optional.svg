<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
<rect width="1200" height="630" fill="#0f172a"/>
<!-- Balance beam -->
<line x1="350" y1="400" x2="850" y2="400" stroke="#6366f1" stroke-width="3" opacity="0.6"/>
<polygon points="600,400 590,430 610,430" fill="#6366f1" opacity="0.5"/>
<!-- Human side (left) -->
<g transform="translate(380,280)">
  <circle cx="40" cy="20" r="20" fill="none" stroke="#a5b4fc" stroke-width="2.5"/>
  <path d="M15,80 Q15,50 40,50 Q65,50 65,80" fill="none" stroke="#a5b4fc" stroke-width="2.5"/>
  <text x="20" y="110" font-family="sans-serif" font-size="14" fill="#a5b4fc" opacity="0.7">Human</text>
</g>
<!-- AI side (right) -->
<g transform="translate(720,280)">
  <rect x="15" y="5" width="50" height="50" rx="10" fill="none" stroke="#818cf8" stroke-width="2.5"/>
  <circle cx="40" cy="30" r="12" fill="none" stroke="#818cf8" stroke-width="2"/>
  <g stroke="#818cf8" stroke-width="1.5">
    <line x1="40" y1="18" x2="40" y2="42"/><line x1="28" y1="30" x2="52" y2="30"/>
  </g>
  <text x="28" y="85" font-family="sans-serif" font-size="14" fill="#818cf8" opacity="0.7">AI</text>
</g>
<!-- Interlocking gears between them -->
<g fill="none" stroke="#c7d2fe" stroke-width="1.5" opacity="0.5">
  <circle cx="600" cy="315" r="30"/>
  <circle cx="600" cy="315" r="20"/>
  <line x1="600" y1="285" x2="600" y2="345"/>
  <line x1="570" y1="315" x2="630" y2="315"/>
  <line x1="579" y1="294" x2="621" y2="336"/>
  <line x1="621" y1="294" x2="579" y2="336"/>
</g>
<!-- Six small indicators (six pillars) around center -->
<g fill="#6366f1" opacity="0.5">
  <circle cx="600" cy="220" r="5"/><circle cx="545" cy="250" r="5"/><circle cx="655" cy="250" r="5"/>
  <circle cx="545" cy="380" r="5"/><circle cx="655" cy="380" r="5"/><circle cx="600" cy="410" r="5"/>
</g>
<!-- Boundary lines -->
<g stroke="#4f46e5" stroke-width="1" opacity="0.2" stroke-dasharray="8,6">
  <line x1="600" y1="100" x2="600" y2="550"/>
</g>
</svg>
