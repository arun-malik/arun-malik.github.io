  - generic [ref=e32]:
    - strong [ref=e33]: Abstract
    - text: "The deployment of autonomous AI agents in production infrastructure introduces fundamental security challenges that traditional role-based access control (RBAC) models cannot address. Unlike deterministic automation, AI agents exhibit stochastic behavior, making conventional trust models insufficient for governing their access to critical systems. This paper presents a decentralized, multi-layered access control architecture designed specifically for agentic AI systems operating in critical cloud infrastructure. Our framework introduces four key innovations: (1) a compound identity model that binds agent actions to delegated human authority, (2) a hierarchical permission system spanning five granularity levels from global platform access to per-parameter constraints, (3) a decentralized policy ownership model where tool teams independently govern their authorization boundaries, and (4) progressive trust escalation with safety interlocks that prevent autonomous agents from executing high-risk operations. We ground our design in the OWASP Top 10 for LLM Applications (2025) threat taxonomy and demonstrate how each architectural decision mitigates specific attack vectors. Deployed in production at a major cloud provider managing network infrastructure across hundreds of datacenters, the system enforces granular access control for 20+ specialized AI agents and 60+ deterministic playbooks processing thousands of operations daily while maintaining zero unauthorized write operations over eight months of production deployment. We present empirical data on access pattern distributions, denial rates, and the effectiveness of layered authorization in preventing privilege escalation by non-deterministic actors."
  - generic [ref=e34]:
    - strong [ref=e35]: "Keywords:"
    - text: Access Control, RBAC, AI Agents, Critical Infrastructure, Zero Trust, LLM Security, Compound Identity, Decentralized Authorization
  - heading "1. Introduction" [level=2] [ref=e36]
  - paragraph [ref=e37]: "The rapid adoption of large language model (LLM)-powered agents in enterprise operations has created an unprecedented security challenge: how to grant production system access to actors whose behavior is fundamentally non-deterministic. Traditional access control systems were designed for two categories of actors: humans who authenticate through identity providers and make conscious decisions, and automated systems that execute predetermined logic. AI agents fit neither category cleanly. They reason, they adapt, they hallucinate, and they can be manipulated through adversarial prompts."
  - paragraph [ref=e38]: In critical infrastructure environments such as cloud network operations, the stakes are particularly high. A single misconfigured network device can cascade into regional outages affecting millions of users. An agent with excessive privileges can be prompt-injected into executing destructive commands. An agent without sufficient access cannot fulfill its operational mandate. This tension between operational necessity and security boundaries is the central challenge addressed in this work.
  - paragraph [ref=e39]: Existing approaches to AI agent security fall into two camps. The first treats agents as untrusted external entities, restricting them to read-only sandboxes that limit their operational value. The second grants agents the same elevated privileges as the humans they serve, creating unacceptable blast radii when agents malfunction or are compromised. Neither approach is viable at scale.
  - paragraph [ref=e40]: "This paper presents a third path: a decentralized granular access control architecture that provides fine-grained, context-aware authorization for AI agents while maintaining the safety guarantees required for critical infrastructure. Our system has been deployed in production for eight months, governing access for 20+ specialized agents operating across hundreds of datacenters, and has maintained zero unauthorized write operations while enabling agents to autonomously resolve over 1,400 operational tasks."
  - heading "1.1 Contributions" [level=3] [ref=e41]
  - paragraph [ref=e42]: "This paper makes the following contributions:"
  - list [ref=e43]:
    - listitem [ref=e44]:
      - strong [ref=e45]: "Compound Identity Model:"
      - text: A novel identity binding mechanism that delegates human authority to AI agents while preserving accountability and audit trails.
    - listitem [ref=e46]:
      - strong [ref=e47]: "Five-Layer Permission Hierarchy:"
      - text: A multi-granularity authorization framework spanning platform, tool, function, parameter, and execution context levels.
    - listitem [ref=e48]:
      - strong [ref=e49]: "Decentralized Policy Ownership:"
      - text: A Git-based governance model where infrastructure tool teams independently define, review, and approve access policies for their services.
    - listitem [ref=e50]:
      - strong [ref=e51]: "Progressive Trust Escalation:"
      - text: A safety-layered approach where write operations require increasingly rigorous authorization, culminating in multi-party approval for high-risk actions.
    - listitem [ref=e52]:
      - strong [ref=e53]: "Empirical Evaluation:"
      - text: Production deployment data demonstrating the security effectiveness and operational impact of the architecture.
  - heading "2. Threat Model and Problem Statement" [level=2] [ref=e54]
  - heading "2.1 The Non-Determinism Problem" [level=3] [ref=e55]
  - paragraph [ref=e56]: "Traditional automation systems (workflow engines, CI/CD pipelines, cron jobs) earned production access through a straightforward trust model: their behavior is deterministic, reviewable, and bounded. Given the same inputs, they produce the same outputs. Their source code can be audited. Their execution paths can be exhaustively tested."
  - paragraph [ref=e57]: "AI agents violate every assumption in this model:"
  - list [ref=e58]:
    - listitem [ref=e59]:
      - strong [ref=e60]: "Stochastic behavior:"
      - text: Given identical inputs, an LLM-powered agent may take different actions due to temperature sampling, context window variations, or model updates.
    - listitem [ref=e61]:
      - strong [ref=e62]: "Prompt vulnerability:"
      - text: Agents can be manipulated through adversarial inputs embedded in the data they process (indirect prompt injection).
    - listitem [ref=e63]:
      - strong [ref=e64]: "Capability amplification:"
      - text: An agent's effective capabilities are the product of its tool access and its reasoning ability, making privilege boundaries harder to predict.
    - listitem [ref=e65]:
      - strong [ref=e66]: "Emergent behavior:"
      - text: Multi-agent systems can exhibit collective behaviors not predicted by individual agent policies.
  - generic [ref=e69]: Figure 1. Trust model comparison between deterministic automation and stochastic AI agents across five security dimensions. Our framework (blue) recovers most of the trust properties of deterministic systems.
