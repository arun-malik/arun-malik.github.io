      - strong [ref=e301]: BREAKGLASS
      - text: = Emergency-only access requiring human approval chain.
  - paragraph [ref=e302]: "The matrix reveals a critical asymmetry: while deterministic workflow engines inherit the full access surface of their service identities (trusted by design), non-deterministic AI agents face progressive restrictions as operations move toward higher-impact service tiers. Specifically, agents are categorically denied write access to Physical Fabric Core services and all device interactions, regardless of the delegating human's privilege level. This represents the fundamental security boundary: an agent's non-determinism disqualifies it from operations where incorrect writes could cause physical infrastructure damage."
  - heading "4. Implementation" [level=2] [ref=e303]
  - heading "4.1 Runtime Authorization Engine" [level=3] [ref=e304]
  - paragraph [ref=e305]: "The authorization engine evaluates every tool invocation against the five-layer hierarchy in real-time. The evaluation process follows a deny-first model:"
  - list [ref=e306]:
    - listitem [ref=e307]: Validate the compound identity (user token freshness, agent MI validity)
    - listitem [ref=e308]: Check global RBAC membership (security group verification)
    - listitem [ref=e309]: Resolve tool-level permissions (is this tool accessible to this role?)
    - listitem [ref=e310]: Evaluate function-level access (is this specific operation permitted?)
    - listitem [ref=e311]: Apply parameter-level constraints (do input values match deny/allow patterns?)
    - listitem [ref=e312]: Verify execution context (playbook scope, incident association, time window)
  - paragraph [ref=e313]: Any layer can deny the request. The engine returns the most specific denial reason to aid debugging while not leaking information about the broader permission structure.
  - heading "4.2 Agent-Specific Security Controls" [level=3] [ref=e314]
  - paragraph [ref=e315]: "Beyond the RBAC framework, agents are subject to additional runtime controls:"
  - list [ref=e316]:
    - listitem [ref=e317]:
      - strong [ref=e318]: "Tool Scoping:"
      - text: Each agent declaration explicitly enumerates its permitted tool set. Tools not listed are invisible to the agent's LLM context.
    - listitem [ref=e319]:
      - strong [ref=e320]: "Permission Boundaries:"
      - text: Maximum permission sets that cannot be exceeded regardless of role inheritance.
    - listitem [ref=e321]:
      - strong [ref=e322]: "Human-in-the-Loop Gates:"
      - text: Configurable checkpoints where agent execution pauses pending human review.
    - listitem [ref=e323]:
      - strong [ref=e324]: "Rate Limiting:"
      - text: Per-agent, per-tool operation quotas preventing runaway execution.
    - listitem [ref=e325]:
      - strong [ref=e326]: "Output Validation:"
      - text: Post-execution verification that agent actions match expected patterns before committing changes.
  - heading "4.3 Bring-Your-Own-Roles (BYOR)" [level=3] [ref=e327]
  - paragraph [ref=e328]: "Onboarding teams create custom roles that span multiple tools, tailored to their operational scenarios:"
  - generic [ref=e329]: "# Custom cross-tool role submitted via PR NetOps-DRI: description: \"Network operations DRI role\" addedBy: netops-team@example.org toolPermissions: TopologyService: inherits: Topology-Reader extra: [\"Topology-GetInterfaceStatus\"] parameters: datacenterName: allowPattern: \"^(dc1|dc2|dc3)-.*$\" DeviceProxy: role: DeviceProxy-Viewer WorkflowEngine: role: Workflow-Reader"
  - paragraph [ref=e330]: "The Bring-Your-Own-Roles model enables teams to compose fine-grained access profiles without requiring platform team intervention. Role definitions follow the same PR-based governance workflow: submitted via pull request, reviewed by tool-owning teams (enforced through OWNERS.txt), and activated upon merge."
  - heading "4.4 Identity Binding and Assignment" [level=3] [ref=e331]
  - paragraph [ref=e332]: "Custom roles are bound to identities through a flexible assignment mechanism supporting multiple identity types:"
  - generic [ref=e333]: "roleAssignments: NetOps-DRI: assignedTo: - type: securityGroup id: \"sg-netops-dri\" - type: managedIdentity id: \"mi-netops-agent\" - type: agent id: \"netops-dri-agent\" - type: playbook id: \"incident-netops-*\""
  - paragraph [ref=e334]: This assignment model allows a single role definition to govern access for human operators (via security groups), automated agents (via managed identities), and structured workflows (via playbook identifiers), while each binding type carries its own authorization constraints.
  - heading "5. Evaluation" [level=2] [ref=e335]
  - heading "5.1 Deployment Context" [level=3] [ref=e336]
  - paragraph [ref=e337]: "The system has been deployed in production for eight months, governing access for a fleet of AI agents operating across the following scale:"
  - list [ref=e338]:
    - listitem [ref=e339]: 20+ specialized AI agents with distinct operational mandates
    - listitem [ref=e340]: 60+ system playbooks for structured automation workflows
    - listitem [ref=e341]: 30+ integrated infrastructure tools and services
    - listitem [ref=e342]: 123 active human users with varying permission levels
    - listitem [ref=e343]: 3,558 agent messages and 1,474 playbook executions in the measurement period
  - heading "5.2 Security Metrics" [level=3] [ref=e344]
  - generic [ref=e347]: Figure 7. Authorization denial rates by layer over the deployment period. Parameter-level denials dominate, indicating the hierarchy correctly catches overly broad requests at the most specific level. The declining trend shows agents learning their boundaries through reinforcement.
