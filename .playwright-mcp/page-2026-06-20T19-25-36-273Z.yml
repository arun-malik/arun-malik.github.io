  - heading "5.4 Decentralization Effectiveness" [level=3] [ref=e387]
  - generic [ref=e390]: "Figure 10. Tool team onboarding velocity: centralized model (months 1-3) vs. decentralized model (months 4-8). The transition to decentralized ownership reduced median policy change time from 5.3 days to 0.8 days while tripling team onboarding rate."
  - heading "6. Discussion" [level=2] [ref=e391]
  - heading "6.1 Design Tradeoffs" [level=3] [ref=e392]
  - paragraph [ref=e393]:
    - strong [ref=e394]: "Expressiveness vs. Complexity:"
    - text: The five-layer hierarchy provides fine-grained control but increases policy authoring complexity. We mitigate this through role inheritance (the
    - code [ref=e395]: inherits
    - text: keyword) and sensible defaults (deny-all for unspecified operations).
  - paragraph [ref=e396]:
    - strong [ref=e397]: "Autonomy vs. Safety:"
    - text: "Restricting agents to read-only by default limits their ability to autonomously resolve incidents requiring configuration changes. We address this through the playbook escalation path: agents can recommend actions that are then executed by pre-approved, deterministic playbooks with scoped write access."
  - paragraph [ref=e398]:
    - strong [ref=e399]: "Decentralization vs. Consistency:"
    - text: Allowing tool teams to independently define policies risks inconsistent security postures. We enforce consistency through schema validation, mandatory fields (owner, tenantRestrictions), and platform-level policy guardrails that tool teams cannot override.
  - heading "6.2 Lessons Learned" [level=3] [ref=e400]
  - list [ref=e401]:
    - listitem [ref=e402]:
      - strong [ref=e403]: "Agents will test boundaries:"
      - text: LLM agents regularly attempt to invoke tools outside their declared scope due to hallucinated capabilities. Deny-by-default is essential, not optional.
    - listitem [ref=e404]:
      - strong [ref=e405]: "Parameter-level control is critical:"
      - text: Function-level access alone is insufficient. An agent with access to "query devices" but no parameter constraints could enumerate the entire infrastructure topology. Deny patterns on sensitive parameters are the most frequently triggered control.
    - listitem [ref=e406]:
      - strong [ref=e407]: "Human-readable policies matter:"
      - text: YAML-based policies that tool teams can read and reason about are more effective than opaque policy engines. Teams that understand their policies maintain them better.
    - listitem [ref=e408]:
      - strong [ref=e409]: "Audit trails enable trust:"
      - text: The immutable audit trail connecting every agent action to a delegating human has been instrumental in building organizational confidence in autonomous operations.
    - listitem [ref=e410]:
      - strong [ref=e411]: "Standard tooling reduces friction:"
      - text: Using Git PRs and OWNERS.txt for governance instead of custom approval systems eliminated the primary adoption barrier. Engineers already know how to submit and review pull requests.
  - heading "6.3 Limitations" [level=3] [ref=e412]
  - paragraph [ref=e413]: Our current architecture has several limitations. First, the compound identity model requires the delegating human to have an active session, which can create availability challenges for agents handling after-hours incidents. Second, the parameter-level deny patterns use regex matching, which cannot express all semantic constraints (for example, restricting operations to devices currently in maintenance windows). Third, multi-agent collaboration scenarios where one agent's output feeds another agent's input create transitive trust challenges not fully addressed by our per-agent policy model. Fourth, the decentralized model assumes tool teams have sufficient security expertise to author correct policies, which requires ongoing education and tooling support.
  - heading "7. Related Work" [level=2] [ref=e414]
  - paragraph [ref=e415]: Access control for AI systems is an emerging research area. Anthropic's "Claude's Character" document introduces the concept of "tool use policies" but does not address multi-tenant production deployments. Google's Secure AI Framework (SAIF) provides security principles for AI systems but focuses on model integrity rather than runtime access control. Microsoft's AI Red Teaming research addresses adversarial testing but not architectural access control patterns.
  - paragraph [ref=e416]: In the broader RBAC literature, attribute-based access control (ABAC) and policy-based access control (PBAC) systems share our goal of fine-grained authorization. Our contribution extends these models specifically for non-deterministic actors, introducing the compound identity concept and progressive trust escalation not found in traditional ABAC/PBAC frameworks.
  - paragraph [ref=e417]: The OWASP Top 10 for LLM Applications (2025) provides the most comprehensive threat taxonomy for LLM-based systems. Our architecture directly addresses threats LLM01 (Prompt Injection), LLM02 (Sensitive Information Disclosure), LLM06 (Excessive Agency), and LLM10 (Unbounded Consumption) through specific architectural controls.
  - paragraph [ref=e418]: Recent work on AI agent frameworks, including ReAct, Toolformer, and generative agent architectures, focuses on capability and reasoning patterns but largely defers security considerations to deployment environments. Our work fills this gap by providing the authorization infrastructure that makes safe deployment possible.
  - heading "8. Conclusion" [level=2] [ref=e419]
  - paragraph [ref=e420]: Deploying AI agents in critical infrastructure requires fundamentally rethinking access control assumptions. Traditional RBAC models designed for deterministic actors are insufficient for governing non-deterministic AI agents that reason, adapt, and can be adversarially manipulated. Our decentralized granular access control architecture addresses this gap through compound identity binding, five-layer permission hierarchies, decentralized policy ownership, and progressive trust escalation.
  - paragraph [ref=e421]: "Eight months of production deployment governing over 20 agents across critical cloud infrastructure validates the approach: zero unauthorized writes, sub-4ms authorization latency, and rapid team onboarding demonstrate that security and operational velocity are not mutually exclusive. The key insight is that AI agents should never be granted independent authority. Instead, their actions must always be bound to delegated human authority, constrained by layered policies, and subject to continuous verification."
  - paragraph [ref=e422]: As AI agents become ubiquitous in infrastructure operations, the principles and patterns presented in this work provide a foundation for secure, scalable, and auditable autonomous operations.
