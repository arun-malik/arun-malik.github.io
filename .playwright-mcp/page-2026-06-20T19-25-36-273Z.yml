  - heading "3.3 Compound Identity Model" [level=3] [ref=e196]
  - paragraph [ref=e197]: "The compound identity model is the cornerstone of our agent authorization approach. Rather than granting agents independent credentials with fixed permissions, each agent operation carries a composite identity that binds together:"
  - list [ref=e198]:
    - listitem [ref=e199]:
      - strong [ref=e200]: "User Token (OBO):"
      - text: The On-Behalf-Of token from the human who initiated or delegated to the agent, establishing accountability and upper-bounding permissions.
    - listitem [ref=e201]:
      - strong [ref=e202]: "Agent Managed Identity:"
      - text: The system-assigned identity of the agent service itself, enabling platform-level access control and audit attribution.
    - listitem [ref=e203]:
      - strong [ref=e204]: "Execution Context:"
      - text: Metadata including the triggering incident, playbook identifier, and temporal constraints.
  - paragraph [ref=e205]: This compound identity ensures that an agent can never exceed the permissions of its delegating human, while also being independently constrained by agent-specific policies. If a human lacks access to a particular production environment, their delegated agent inherits that restriction regardless of the agent's own role assignments.
  - generic [ref=e208]: "Figure 4. Compound identity resolution: effective access is computed as the intersection of user permissions, agent role boundaries, and execution context constraints."
  - heading "3.4 Decentralized Policy Ownership" [level=3] [ref=e209]
  - paragraph [ref=e210]: "A key architectural innovation is the decentralization of policy definition to tool-owning teams. Rather than maintaining a monolithic access control configuration, each infrastructure service team owns their authorization policy as a YAML file in a version-controlled repository:"
  - generic [ref=e211]: "toolName: TopologyService owner: topology-team@example.org roles: Topology-Reader: description: \"Read-only topology queries\" permissions: functions: - \"Topology-GetDeviceInfo\" - \"Topology-QueryGraph\" Topology-Writer: inherits: Topology-Reader permissions: functions: - \"Topology-UpdateConfig\" parameters: environment: denyPattern: \"prod-.*\" Topology-Admin: inherits: Topology-Writer permissions: bypassPatterns: true tenantRestrictions: allowedTenants: [\"corp.example.org\"]"
  - paragraph [ref=e212]: "This decentralized model provides several critical properties:"
  - list [ref=e213]:
    - listitem [ref=e214]:
      - strong [ref=e215]: "Ownership clarity:"
      - text: Each tool team knows exactly what access they have granted and to whom.
    - listitem [ref=e216]:
      - strong [ref=e217]: "Independent evolution:"
      - text: Teams can add new roles, modify permissions, and revoke access without coordinating with the central platform team.
    - listitem [ref=e218]:
      - strong [ref=e219]: "Git-based governance:"
      - text: All policy changes go through pull requests with required reviewer approval (OWNERS.txt), providing full audit history and the ability to revert.
    - listitem [ref=e220]:
      - strong [ref=e221]: "Hot-reload:"
      - text: Policy changes take effect upon merge without service restarts, enabling rapid response to security incidents.
  - generic [ref=e224]: Figure 5. Comparison of centralized vs. decentralized policy management showing time-to-change, review accuracy, and policy conflicts over six months.
