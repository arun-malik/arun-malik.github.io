  - paragraph [ref=e138]:
    - strong [ref=e139]: Playbooks
    - text: represent a critical fourth actor class distinct from both AI agents and traditional services. A playbook is a
    - emphasis [ref=e140]: deterministic, pre-authored workflow
    - text: "composed of discrete steps that execute infrastructure operations in a fixed sequence. Unlike AI agents, which reason dynamically about tool selection and parameters, playbooks follow authored logic that has been code-reviewed, tested, and approved before deployment. This determinism grants playbooks a higher trust level: they may hold scoped write permissions (e.g., restarting a service, modifying a configuration) that agents cannot obtain directly. In our architecture, AI agents that identify a remediation action delegate execution to an appropriate playbook rather than performing writes autonomously, creating an"
    - emphasis [ref=e141]: agent→playbook escalation path
    - text: that preserves both the agent's analytical capability and the playbook's safety guarantees. Each playbook runs under a compound identity combining a system-managed identity with the authoring engineer's identity, enabling full auditability of both the workflow definition and its runtime execution.
  - heading "3. Architecture" [level=2] [ref=e142]
  - heading "3.1 Design Principles" [level=3] [ref=e143]
  - paragraph [ref=e144]: "Six core security principles guide the architecture:"
  - list [ref=e145]:
    - listitem [ref=e146]:
      - strong [ref=e147]: "Least Privilege:"
      - text: Every actor receives the minimum permissions required for its function. Agents default to read-only access.
    - listitem [ref=e148]:
      - strong [ref=e149]: "Zero Trust:"
      - text: No implicit trust based on network position or prior behavior. Every request is authenticated, authorized, and audited.
    - listitem [ref=e150]:
      - strong [ref=e151]: "Excessive Agency Guard (OWASP LLM06):"
      - text: Agents are explicitly prevented from accumulating capabilities beyond their defined scope through tool scoping and parameter-level deny patterns.
    - listitem [ref=e152]:
      - strong [ref=e153]: "Delegated Identity:"
      - text: Agents never operate with independent authority. Their actions are bound to a delegating human's identity and permissions.
    - listitem [ref=e154]:
      - strong [ref=e155]: "Observability and Audit:"
      - text: Every agent action produces an immutable audit trail linking the action to both the agent and its delegating authority.
    - listitem [ref=e156]:
      - strong [ref=e157]: "Environment Isolation:"
      - text: Production and corporate environments maintain strict separation with independent credential systems.
