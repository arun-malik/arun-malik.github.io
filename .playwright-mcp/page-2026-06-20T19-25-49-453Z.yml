  - heading "A. Dimension Analysis" [level=3] [ref=e326]
  - paragraph [ref=e327]:
    - strong [ref=e328]: "Dimension 1: Setup Cost."
    - text: CLI commands exist on every Unix and Windows installation. An agent can invoke
    - code [ref=e329]: grep
    - text: ","
    - code [ref=e330]: curl
    - text: ", or"
    - code [ref=e331]: git
    - text: with no prior configuration. MCP requires deploying at least one server process (or connecting to a hosted endpoint), registering tool schemas, and configuring authentication. For ephemeral tasks on a developer's local machine, this overhead is difficult to justify.
  - paragraph [ref=e332]:
    - strong [ref=e333]: "Dimension 3: Model Familiarity."
    - text: Large language models are trained on corpora containing millions of shell command examples from man pages, Stack Overflow posts, and open-source repositories. The model already knows that
    - code [ref=e334]: grep -rn "pattern" .
    - text: searches recursively with line numbers. MCP tools, by contrast, are novel to the model; it must parse the JSON schema at runtime to learn what parameters a tool accepts. This distinction narrows over time as MCP schemas appear in training data, but as of mid-2026, CLI retains a significant advantage in zero-shot accuracy for shell operations.
  - paragraph [ref=e335]:
    - strong [ref=e336]: "Dimension 4: Output Parsing."
    - text: CLI output is free-form text. The output of
    - code [ref=e337]: ls -la
    - text: differs between GNU coreutils and BSD;
    - code [ref=e338]: docker ps
    - text: "output changed format between Docker 23 and 24. The model must interpret column alignment, handle locale-dependent date formats, and distinguish informational output from errors. MCP returns typed JSON with a contract: a"
    - code [ref=e339]: read_file
    - text: tool always returns
    - code [ref=e340]: "{\"content\": \"...\"}"
    - text: . Downstream processing (chaining tools, populating UI) becomes deterministic rather than heuristic.
  - paragraph [ref=e341]:
    - strong [ref=e342]: "Dimension 12: Composability."
    - text: "CLI achieves composition through pipes:"
    - code [ref=e343]: cat file | grep pattern | wc -l
    - text: ". This works well for text streams but breaks when output format changes between versions. If an upstream command adds a header line, downstream counts become incorrect. MCP supports typed chaining: one tool's structured output feeds directly into another tool's validated input schema. The MCP client can verify type compatibility before invocation, preventing silent failures."
  - paragraph [ref=e344]:
    - strong [ref=e345]: "Dimension 13: Speed."
    - text: For simple local operations, CLI executes a system call directly. No serialization, no network round-trip, no protocol negotiation. MCP adds JSON-RPC serialization, transport (typically stdio or HTTP), server-side deserialization, execution, and response serialization. Measured overhead ranges from 50ms (stdio transport, local server) to 200ms (HTTP transport, remote server). For a single file read, this latency is noticeable. For a complex workflow with 20+ tool calls, it becomes negligible relative to LLM inference time.
  - paragraph [ref=e346]:
    - strong [ref=e347]: "Dimension 14: Ecosystem Breadth."
    - text: "CLI has decades of accumulated tooling: thousands of Unix utilities, package managers, cloud CLIs (aws, az, gcloud), database clients, and container runtimes. MCP, launched in late 2024, has grown to over 5,800 registered connectors as of mid-2026. The ecosystems overlap substantially (most CLI tools now have MCP equivalents), making this dimension a draw. The relevant difference is not breadth but access model: CLI tools grant full capability by default; MCP connectors expose only explicitly declared operations."
