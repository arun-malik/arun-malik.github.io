      - 'heading "Access Modes: Transition vs. Enforced" [level=3] [ref=e117]'
      - paragraph [ref=e118]:
        - text: NSP supports two access modes. In
        - strong [ref=e119]: Transition mode
        - text: (formerly called Learning mode), the perimeter logs all traffic that would be denied in enforced mode without actually blocking it. This gives you visibility into existing access patterns before cutting off traffic. In
        - strong [ref=e120]: Enforced mode
        - text: ", all traffic except intra-perimeter and explicitly allowed flows is denied."
      - paragraph [ref=e121]: "The recommended deployment pattern: associate resources in Transition mode, analyze access logs for 2-4 weeks, create access rules for legitimate traffic, then switch to Enforced mode. This avoids the outage risk of blocking traffic you did not know existed."
      - generic [ref=e122]:
        - strong [ref=e123]: Operational Note
        - paragraph [ref=e124]: NSP is now generally available in all Azure public cloud regions and Azure Government regions. Private Endpoint traffic is allowed without explicit access rules when both the endpoint and the resource are within the same perimeter.
      - 'heading "Layer 2: Private Endpoints and Private Link" [level=2] [ref=e125]'
      - paragraph [ref=e126]: If NSP secures the control plane, Private Link secures the data plane. A Private Endpoint creates a network interface inside your VNet with a private IP address that maps to a specific PaaS resource. Traffic between your workload and the resource traverses the Microsoft backbone network; it never touches the public internet.
      - heading "Why Private Endpoints Matter for Zero Trust" [level=3] [ref=e127]
      - paragraph [ref=e128]:
        - text: Consider a standard Azure Storage account. Without Private Endpoints, your application connects to
        - code [ref=e129]: mystorageaccount.blob.core.windows.net
        - text: which resolves to a public IP. Even with firewall rules restricting access to your VNet, the traffic still transits a public endpoint. DNS poisoning, BGP hijacking, or a misconfigured firewall rule could expose this path.
      - paragraph [ref=e130]:
        - text: With a Private Endpoint, the same FQDN resolves to
        - code [ref=e131]: 10.0.1.5
        - text: (a private IP in your VNet). The connection is entirely private. There is no public attack surface. If you then disable public access on the storage account, the resource becomes invisible to the internet entirely.
