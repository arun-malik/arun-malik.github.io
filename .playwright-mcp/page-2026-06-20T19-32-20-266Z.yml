      - 'heading "Layer 3: Network Security Groups and Service Tags" [level=2] [ref=e170]'
      - paragraph [ref=e171]: "Network Security Groups (NSGs) are the foundational traffic filter in Azure. They operate at Layer 4 (TCP/UDP), allowing you to define allow/deny rules based on source, destination, port, and protocol. In a Zero Trust model, NSGs enforce the principle of least privilege at the network layer: deny all traffic by default, then explicitly allow only the flows your application requires."
      - 'heading "Service Tags: Managed IP Prefix Groups" [level=3] [ref=e172]'
      - paragraph [ref=e173]: Service Tags replace hardcoded IP addresses in NSG rules with dynamically managed IP prefix groups. Microsoft maintains these groups and updates them automatically as Azure service IP ranges change. This eliminates the operational burden of tracking and rotating IP addresses manually.
      - paragraph [ref=e174]:
        - text: "Consider a common scenario: your application needs to call Azure Key Vault. Without Service Tags, you would need to look up the current IP ranges for Key Vault in your region, create NSG rules with those IPs, and update them whenever Microsoft changes the ranges. With Service Tags, you write one rule: allow outbound to"
        - code [ref=e175]: AzureKeyVault.WestUS2
        - text: . Done.
