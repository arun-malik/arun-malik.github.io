      - heading "Common AVNM Patterns" [level=3] [ref=e276]
      - paragraph [ref=e277]:
        - strong [ref=e278]: "Block high-risk ports globally:"
        - text: Create an admin rule denying inbound SSH (22) and RDP (3389) from the Internet across all network groups. Individual teams cannot create NSG rules to allow these ports, even if they have full NSG write permissions.
      - paragraph [ref=e279]:
        - strong [ref=e280]: "Enforce network segmentation:"
        - text: Block traffic between production and development network groups. This prevents accidental cross-environment communication even if VNet peering is misconfigured.
      - paragraph [ref=e281]:
        - strong [ref=e282]: "Always Allow for exceptions:"
        - text: The "Always Allow" action permits traffic regardless of subsequent deny rules. Use this sparingly for infrastructure services that must remain reachable (Azure Monitor, Key Vault) even when other deny rules are in place.
      - 'heading "Layer 5: Azure Policy for Continuous Enforcement" [level=2] [ref=e283]'
      - paragraph [ref=e284]: "The previous layers define the security controls. Azure Policy ensures those controls remain in place. Without policy enforcement, security configurations degrade over time: someone disables a firewall rule for debugging, a new resource deploys without a Private Endpoint, an NSG gets deleted during a migration."
