      - 'heading "Layer 1: Network Security Perimeter (NSP)" [level=2] [ref=e75]'
      - paragraph [ref=e76]: "Network Security Perimeter is Azure's newest network security primitive. It creates a logical boundary around PaaS resources that are deployed outside your virtual networks. The core insight behind NSP: Private Link secures the data plane (how you connect to resources), but NSP secures the control plane (who can access resources and from where)."
      - heading "How NSP Works" [level=3] [ref=e77]
      - paragraph [ref=e78]: When you create a Network Security Perimeter and associate PaaS resources with it in enforced mode, all public network access is denied by default. Resources within the same perimeter can communicate freely with each other (intra-perimeter traffic), but any traffic crossing the perimeter boundary requires an explicit access rule.
      - paragraph [ref=e79]: "This is the critical difference from traditional NSG-based security: NSP operates at the PaaS resource level, not the virtual network level. You can secure an Azure Storage account, Key Vault, or Azure AI Search instance without deploying it into a VNet or configuring Private Endpoints for every consumer."
      - generic [ref=e80]:
        - strong [ref=e81]: "Key Capability: Preventing Data Exfiltration"
        - paragraph [ref=e82]: "NSP prevents a common attack pattern: a compromised workload writing sensitive data to an attacker-controlled storage account. Because the attacker's storage account is outside the perimeter, the write fails. Traditional NSGs cannot prevent this because they operate at the IP/port level, not the resource identity level."
