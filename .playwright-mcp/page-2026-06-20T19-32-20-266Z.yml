    - paragraph [ref=e47]: "Traditional perimeter-based security models assume that everything inside the corporate network boundary is trustworthy. That assumption has failed repeatedly in practice. Zero Trust inverts the model: trust nothing, verify everything, assume breach. This post describes how I implement Zero Trust network security across Azure infrastructure at enterprise scale, covering the full stack from Network Security Perimeter (NSP) for PaaS isolation through Private Link for data-plane protection, AVNM for centralized policy enforcement, and IP Address Management with Service Tags for precise traffic control. Each layer addresses a specific class of threats while maintaining operational simplicity at scale."
    - generic [ref=e48]:
      - heading "The Problem with Perimeter Security" [level=2] [ref=e49]
      - paragraph [ref=e50]: "For decades, network security followed a castle-and-moat architecture: a hardened perimeter (firewalls, DMZs, VPN gateways) protecting a trusted interior. If you were inside the perimeter, you had broad access. If you were outside, you did not. This model breaks down for three reasons that are now obvious but were once controversial:"
      - paragraph [ref=e51]: First, cloud workloads have no meaningful perimeter. An Azure Storage account is accessible from any network by default. A SQL Database exposes a public endpoint. The interior/exterior distinction vanishes when your infrastructure spans dozens of regions and hundreds of subscriptions.
      - paragraph [ref=e52]: Second, lateral movement is the primary attack vector in modern breaches. Once an attacker compromises a single workload (phishing, supply chain, misconfiguration), they move laterally through the flat internal network. A perimeter-only model offers no resistance to this movement.
      - paragraph [ref=e53]: Third, the blast radius of a compromised identity is unbounded in a perimeter model. A single set of leaked credentials can access every resource the network can reach.
      - paragraph [ref=e54]: "Zero Trust replaces implicit trust with explicit verification at every layer: identity, device, network, application, and data. In network security specifically, this means every flow must be explicitly authorized, every resource must be isolated by default, and every access decision must be logged and auditable."
