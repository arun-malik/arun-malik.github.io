      - 'heading "Layer 6: External Scanning and Continuous Validation" [level=2] [ref=e320]'
      - paragraph [ref=e321]: A Zero Trust posture is only as strong as your ability to verify it. External scanning validates that your controls work as intended by testing your infrastructure from an attacker's perspective. Internal configuration audits can miss gaps that external probing reveals.
      - heading "What to Scan" [level=3] [ref=e322]
      - list [ref=e323]:
        - listitem [ref=e324]:
          - strong [ref=e325]: "Public endpoints:"
          - text: Identify any resources with public IPs or enabled public access that should be private.
        - listitem [ref=e326]:
          - strong [ref=e327]: "DNS exposure:"
          - text: Enumerate public DNS records for your domains and verify they resolve to Private Endpoints where expected.
        - listitem [ref=e328]:
          - strong [ref=e329]: "Certificate validity:"
          - text: Expired or misconfigured TLS certificates can force fallback to insecure connections.
        - listitem [ref=e330]:
          - strong [ref=e331]: "Open ports:"
          - text: Scan public-facing IPs for open ports that should not be exposed (SSH, RDP, database ports).
      - paragraph [ref=e332]: Integrate external scanning into your CI/CD pipeline. Before a deployment promotes to production, validate that no new public endpoints were introduced. After deployment, run a post-deployment scan to confirm the deployed state matches the expected state.
      - 'heading "Layer 7: Shift Left and Infrastructure as Code" [level=2] [ref=e333]'
      - paragraph [ref=e334]: "Security controls deployed reactively are always behind the threat. Shift Left means security validation happens at the earliest possible stage: during code review, in CI/CD pipelines, and before infrastructure changes reach production."
      - heading "IaC Security Validation Pipeline" [level=3] [ref=e335]
      - generic [ref=e336]:
        - code [ref=e338]: "# Example: GitHub Actions step for Terraform security scanning - name: Run tfsec uses: aquasecurity/tfsec-action@v1.0.0 with: soft_fail: false # Azure Policy compliance check before deployment - name: Check Policy Compliance run: | az policy state trigger-scan --resource-group $RG az policy state list --resource-group $RG \\ --filter \"complianceState eq 'NonCompliant'\" \\ --query \"[].{policy:policyDefinitionName, resource:resourceId}\""
        - button "Copy" [ref=e339] [cursor=pointer]
      - paragraph [ref=e340]: "Security gates in the pipeline should check for:"
      - list [ref=e341]:
        - listitem [ref=e342]: Resources deployed without Private Endpoints
        - listitem [ref=e343]: NSGs with overly permissive rules (0.0.0.0/0 source on sensitive ports)
        - listitem [ref=e344]: Subnets without attached NSGs
        - listitem [ref=e345]: Storage accounts or databases with public access enabled
        - listitem [ref=e346]: Secrets or connection strings hardcoded in templates
      - 'heading "Layer 8: Attestation and Ownership Reviews" [level=2] [ref=e347]'
      - paragraph [ref=e348]: Technical controls drift over time. Teams change, projects end, resources become orphaned, and permissions accumulate beyond what is needed. Regular attestation reviews verify that the security posture you built in layers 1-7 still reflects current reality.
      - heading "What to Attest" [level=3] [ref=e349]
      - list [ref=e350]:
        - listitem [ref=e351]:
          - strong [ref=e352]: "Resource ownership:"
          - text: Every resource has a current owner who is accountable for its security posture.
        - listitem [ref=e353]:
          - strong [ref=e354]: "Access permissions:"
          - text: Every identity (user, service principal, managed identity) with network access has a current justification.
        - listitem [ref=e355]:
          - strong [ref=e356]: "NSG rules:"
          - text: Every allow rule in every NSG has a documented purpose and an owner who can explain why it exists.
        - listitem [ref=e357]:
          - strong [ref=e358]: "Exception rules:"
          - text: Every NSP access rule and AVNM "Always Allow" rule is reviewed quarterly and removed when no longer needed.
      - paragraph [ref=e359]: Automate as much of this as possible. Azure Resource Graph queries can identify orphaned resources, unused permissions, and stale configurations. Build dashboards that surface compliance drift before it becomes a security incident.
      - heading "Putting It All Together" [level=2] [ref=e360]
      - paragraph [ref=e361]: "Zero Trust network security in Azure is not a single product or a one-time configuration. It is a layered architecture where each layer addresses a specific threat vector, and the layers reinforce each other:"
      - generic [ref=e362]:
        - img [ref=e363]:
          - generic [ref=e365]: "Layer 8: Attestation & Ownership Reviews (continuous governance)"
          - generic [ref=e367]: "Layer 7: Shift Left / IaC Security (prevent before deploy)"
          - generic [ref=e369]: "Layer 6: External Scanning (validate from attacker's view)"
          - generic [ref=e371]: "Layer 5: Azure Policy (continuous enforcement)"
          - generic [ref=e373]: "Layer 4: AVNM Security Admin Rules (non-overridable guardrails)"
          - generic [ref=e375]: "Layer 3: NSGs + Service Tags (network-level ACLs)"
          - generic [ref=e377]: "Layer 2: Private Endpoints (data-plane isolation)"
          - generic [ref=e379]: "Layer 1: Network Security Perimeter (PaaS boundary control)"
        - generic [ref=e380]: "Figure 3: The eight layers of Zero Trust network security. Each layer operates independently and reinforces the others."
      - generic [ref=e381]:
