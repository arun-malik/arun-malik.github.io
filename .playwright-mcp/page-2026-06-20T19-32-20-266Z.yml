        - strong [ref=e216]: Service Tags Are Not Sufficient Alone
        - paragraph [ref=e217]:
          - text: Service Tags simplify IP-based ACLs but are not a complete security solution. A Service Tag for
          - code [ref=e218]: Storage
          - text: includes all Azure Storage accounts, including attacker-controlled ones. Combine Service Tags with Private Endpoints (which pin to a specific resource instance) and NSP (which prevents cross-boundary access) for proper data exfiltration protection.
      - heading "IPAM and Custom Service Tags" [level=3] [ref=e219]
      - paragraph [ref=e220]: "Azure IP Address Manager (IPAM) provides centralized IP address planning, allocation, and tracking across your Azure environment. For organizations operating at scale, IPAM solves the problem of IP address sprawl: overlapping address spaces, exhausted subnets, and inconsistent allocation across teams."
      - paragraph [ref=e221]: In the context of Zero Trust, IPAM enables you to create custom service tags based on your own IP address pools. This allows NSG rules that reference your internal service boundaries rather than relying solely on Microsoft-managed tags. For example, you can create a service tag for your "payment processing" subnet range and reference it across all NSGs in your environment, ensuring that only explicitly designated networks can reach payment infrastructure.
      - generic [ref=e222]:
        - code [ref=e224]: "# Register a custom IP prefix for use as a service tag az network custom-ip prefix create \\ --name PaymentServices \\ --resource-group rg-networking \\ --cidr 10.50.0.0/16 \\ --zone 1 # Use in NSG rules across your environment az network nsg rule create \\ --nsg-name nsg-web-tier \\ --name AllowToPayment \\ --priority 200 \\ --direction Outbound \\ --access Allow \\ --source-address-prefixes VirtualNetwork \\ --destination-address-prefixes 10.50.0.0/16 \\ --destination-port-ranges 443"
        - button "Copy" [ref=e225] [cursor=pointer]
      - 'heading "Layer 4: Azure Virtual Network Manager (AVNM)" [level=2] [ref=e226]'
      - paragraph [ref=e227]: "Individual NSG rules work at the subnet or NIC level. They are managed by the team that owns the resource. This creates a fundamental governance problem: a team can modify or delete their NSG rules, bypassing security policies set by the platform team. Azure Virtual Network Manager solves this by introducing Security Admin Rules that operate at a higher precedence than NSG rules and cannot be overridden by resource owners."
