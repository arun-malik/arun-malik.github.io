        - generic [ref=e408]: "Figure 4: Defense-in-depth as concentric rings. Implementation begins at the core (NSGs) and progressively expands outward through each security layer."
      - generic [ref=e409]:
        - strong [ref=e410]: The Critical Insight
        - paragraph [ref=e411]: No single layer is sufficient. An attacker who bypasses your NSG (layer 3) still faces Private Endpoint isolation (layer 2) and NSP boundaries (layer 1). A misconfigured AVNM rule (layer 4) is caught by Azure Policy (layer 5) and validated by external scanning (layer 6). The layers create redundancy through diversity.
      - heading "Implementation Roadmap" [level=2] [ref=e412]
      - paragraph [ref=e413]: The following staircase shows how to sequence your Zero Trust adoption. Each phase builds on the previous one, and the layers within each phase can be deployed in parallel.
