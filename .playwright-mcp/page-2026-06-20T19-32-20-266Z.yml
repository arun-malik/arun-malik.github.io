      - heading "Operational Recommendations" [level=2] [ref=e436]
      - list [ref=e437]:
        - listitem [ref=e438]:
          - strong [ref=e439]: Start with visibility.
          - text: Deploy NSP in Transition mode and Azure Policy in Audit mode before enforcing. Understand your current traffic patterns before restricting them.
        - listitem [ref=e440]:
          - strong [ref=e441]: Automate everything.
          - text: Manual security processes do not scale and they drift. Every control should be expressed as code, deployed through pipelines, and validated continuously.
        - listitem [ref=e442]:
          - strong [ref=e443]: Measure compliance, not just configuration.
          - text: A deployed NSG is not security. A validated, tested NSG that blocks the traffic it should block is security. Test your controls from the attacker's perspective.
        - listitem [ref=e444]:
          - strong [ref=e445]: Plan for failure.
          - text: Every security control will eventually be misconfigured, bypassed, or degraded. The layered approach ensures no single point of failure compromises your entire posture.
        - listitem [ref=e446]:
          - strong [ref=e447]: Iterate continuously.
          - text: Zero Trust is not a destination. New services, new attack vectors, and new Azure features require ongoing adaptation. Build review cycles into your operational rhythm.
