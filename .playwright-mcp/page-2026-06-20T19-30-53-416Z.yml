- generic [ref=e2]: "// Hero Banner - consistent placement across all page types // Always inserts immediately after the navigation bar (regardless of page structure) (function() { 'use strict'; function init() { var ogImage = document.querySelector('meta[property=\"og:image\"]'); if (!ogImage) return; var imageUrl = ogImage.getAttribute('content'); if (!imageUrl || imageUrl.includes('og-default')) return; // Create hero banner var hero = document.createElement('div'); hero.className = 'post-hero-banner'; // Find the navigation element (handles all page layouts) var nav = document.querySelector('header') || document.querySelector('nav.blog-nav') || document.querySelector('nav.nav-bar') || document.querySelector('nav.site-nav') || document.querySelector('nav'); if (!nav) return; // Insert banner immediately after nav/header nav.after(hero); } // Inject consistent styles function injectStyles() { var style = document.createElement('style'); style.id = 'hero-banner-styles'; style.textContent = [ '.post-hero-banner {', ' width: 100%;', ' max-width: 900px;', ' height: 180px;', ' margin: 1.5rem auto 2rem;', ' border-radius: 10px;', ' opacity: 0.9;', ' background: var(--hero-bg, url(' + (document.querySelector('meta[property=\"og:image\"]') || {}).content + ')) center/cover no-repeat;', '}', '@media (max-width: 640px) { .post-hero-banner { height: 120px; border-radius: 0; margin: 0 0 1.5rem; } }' ].join(''); document.head.appendChild(style); } function run() { var ogImage = document.querySelector('meta[property=\"og:image\"]'); if (!ogImage) return; var imageUrl = ogImage.getAttribute('content'); if (!imageUrl || imageUrl.includes('og-default')) return; // Inject styles var style = document.createElement('style'); style.textContent = '.post-hero-banner{width:100%;max-width:900px;height:180px;margin:1.5rem auto 2rem;border-radius:10px;opacity:0.9;background:url(' + imageUrl + ') center/cover no-repeat}@media(max-width:640px){.post-hero-banner{height:120px;border-radius:0;margin:0 0 1.5rem}}'; document.head.appendChild(style); // Create banner element var hero = document.createElement('div'); hero.className = 'post-hero-banner'; // Find nav (handles all page structures consistently) var insertPoint = document.querySelector('header') || document.querySelector('nav.blog-nav') || document.querySelector('nav.nav-bar') || document.querySelector('nav') || document.querySelector('.blog-header') || document.querySelector('h1'); if (insertPoint) { insertPoint.after(hero); } } if (document.readyState === 'loading') { document.addEventListener('DOMContentLoaded', run); } else { run(); } })();"