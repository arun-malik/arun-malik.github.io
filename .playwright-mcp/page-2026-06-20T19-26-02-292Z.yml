        - generic [ref=e48]:
          - heading "The Pitch You Keep Hearing" [level=2] [ref=e49]
          - paragraph [ref=e50]: "\"Agents should be fully autonomous.\" \"Code is cheap, let AI iterate.\" \"Human oversight is a temporary scaffolding.\" \"Speed requires removing humans from the loop.\""
          - paragraph [ref=e51]: If you work anywhere near AI systems in 2026, you have heard some version of these claims. They are compelling. They are also, when applied to production systems at scale, dangerously incomplete.
          - paragraph [ref=e52]:
            - text: This post introduces a six-pillar argument, supported by 53 research papers and a hyperscale production case study, for why human-in-the-loop (HITL) is not a transitional compromise. It is a structural requirement. The full research paper is available on
            - link "our site" [ref=e53] [cursor=pointer]:
              - /url: /posts/hitl-six-pillar-framework/
            - text: ", but this series breaks the argument into digestible pieces for practitioners, architects, and engineering leaders."
          - separator [ref=e54]
          - heading "The Core Thesis" [level=2] [ref=e55]
          - blockquote [ref=e56]:
            - paragraph [ref=e57]: "The question is not whether agents should be autonomous or supervised. The question is: at what boundaries should human judgement intervene, and how do we keep humans cognitively fit to intervene effectively when the moment arrives?"
          - paragraph [ref=e58]:
            - text: Most sophisticated organisations already use tiered governance. Low-risk tasks run autonomously while high-risk operations require human approval. Our argument is not directed at the naive "full autonomy" strawman. Rather, we contend that even well-intentioned tiered approaches systematically underinvest in the
            - emphasis [ref=e59]: structural
            - text: "requirements of effective oversight: boundary design methodology, cognitive fitness preservation, entropy detection, and graduated trust."
          - paragraph [ref=e60]: The relevant debate is not "autonomy versus oversight" but "bounded autonomy with principled governance versus autonomy with ad hoc constraints that erode under production pressure."
          - separator [ref=e61]
          - heading "Six Pillars, One Conclusion" [level=2] [ref=e62]
          - paragraph [ref=e63]: "Evidence from six independent research domains converges on the same conclusion. Here is the framework at a glance:"
