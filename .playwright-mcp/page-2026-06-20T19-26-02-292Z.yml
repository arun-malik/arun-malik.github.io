                - cell "Sleeper agents survive RLHF; models detect and adapt to evaluations" [ref=e100]
          - paragraph [ref=e101]: Each pillar has its own blog post in this series, where we go deep on the research, show the data, and discuss practical implications.
          - separator [ref=e102]
          - heading "The 2-vs-6 Tradeoff" [level=2] [ref=e103]
          - paragraph [ref=e104]:
            - text: "Full autonomy wins on exactly two dimensions:"
            - strong [ref=e105]: speed
            - text: (no human latency) and
            - strong [ref=e106]: raw scalability
            - text: (no human bottleneck). We acknowledge this forthrightly.
          - paragraph [ref=e107]: "But the industry is trading those two efficiency gains for six robustness losses:"
          - list [ref=e108]:
            - listitem [ref=e109]:
              - strong [ref=e110]: Safety
              - text: "- errors compound without external correction"
            - listitem [ref=e111]:
              - strong [ref=e112]: Accountability
              - text: "- responsibility chains fragment when no human decides"
            - listitem [ref=e113]:
              - strong [ref=e114]: Security
              - text: "- every capability is also an attack surface"
            - listitem [ref=e115]:
              - strong [ref=e116]: Cognitive fitness
              - text: "- human operators atrophy when removed from the loop"
            - listitem [ref=e117]:
              - strong [ref=e118]: Novel failure resilience
              - text: "- agents cannot reframe problems or challenge their own assumptions"
            - listitem [ref=e119]:
              - strong [ref=e120]: Legal compliance
              - text: "- EU AI Act Article 14 requires human oversight for high-risk AI"
          - paragraph [ref=e121]: The critical issue is that this tradeoff is frequently made without awareness of the costs involved.
          - separator [ref=e122]
          - heading "\"But We Already Have Guardrails\"" [level=2] [ref=e123]
          - paragraph [ref=e124]: Yes, you probably do. And they are probably eroding.
          - paragraph [ref=e125]: Gartner warned in May 2026 that applying uniform governance across AI agents will lead to enterprise AI agent failure. They predict that by 2027, 40% of enterprises will demote or decommission autonomous agents due to governance gaps discovered only after incidents occur.
          - paragraph [ref=e126]: The failure mode is not "we have no guardrails." It is "our guardrails were designed for a simpler version of this system, nobody updated them as autonomy expanded, and the incentive structure rewards removing friction."
          - separator [ref=e127]
          - 'heading "Proof It Works: The Case Study" [level=2] [ref=e128]'
          - paragraph [ref=e129]: We tested this framework in production. A hyperscale cloud networking platform processed over 29,000 incidents and executed more than 100,000 autonomous actions over six months. During this period, adoption grew 23x. The system maintained strategic human oversight throughout.
          - paragraph [ref=e130]: "Key results:"
          - list [ref=e131]:
            - listitem [ref=e132]:
              - strong [ref=e133]: "Autonomous resolution rate:"
              - text: Greater than 35% (and growing as modules mature)
            - listitem [ref=e134]:
              - strong [ref=e135]: "Median response time:"
              - text: Under 20 minutes (with human checkpoints included)
            - listitem [ref=e136]:
              - strong [ref=e137]: "Adoption scaling:"
              - text: 23x growth with no proportional increase in human reviewers
            - listitem [ref=e138]:
              - strong [ref=e139]: "Critical safety incidents from autonomous actions:"
              - text: Zero
          - paragraph [ref=e140]: "The insight: HITL and high autonomy are complementary, not contradictory, when you architect explicit graduation boundaries for automation. Speed and safety are a false dichotomy if the boundaries are right."
          - separator [ref=e141]
          - heading "Strategic HITL vs Tactical HITL" [level=2] [ref=e142]
          - paragraph [ref=e143]:
            - text: A crucial distinction. Most people hear "human-in-the-loop" and picture someone clicking "approve" on every action. That is
            - emphasis [ref=e144]: tactical
            - text: HITL. It does not scale. It creates bottlenecks. It is the version everyone rightly wants to eliminate.
          - paragraph [ref=e145]:
            - emphasis [ref=e146]: Strategic
            - text: "HITL is different:"
          - table [ref=e147]:
            - rowgroup [ref=e148]:
              - row "Tactical HITL Strategic HITL" [ref=e149]:
                - columnheader [ref=e150]
                - columnheader "Tactical HITL" [ref=e151]
                - columnheader "Strategic HITL" [ref=e152]
            - rowgroup [ref=e153]:
              - row "Human role Approve individual actions Design automation boundaries" [ref=e154]:
                - cell "Human role" [ref=e155]:
                  - strong [ref=e156]: Human role
                - cell "Approve individual actions" [ref=e157]
                - cell "Design automation boundaries" [ref=e158]
              - row "Scales with Number of actions (does not scale) System maturity (scales naturally)" [ref=e159]:
                - cell "Scales with" [ref=e160]:
                  - strong [ref=e161]: Scales with
                - cell "Number of actions (does not scale)" [ref=e162]
                - cell "System maturity (scales naturally)" [ref=e163]
              - row "Bottleneck Every action waits for human Only exceptions reach humans" [ref=e164]:
                - cell "Bottleneck" [ref=e165]:
                  - strong [ref=e166]: Bottleneck
                - cell "Every action waits for human" [ref=e167]
                - cell "Only exceptions reach humans" [ref=e168]
              - row "Outcome Human as rubber stamp Human as architect of trust" [ref=e169]:
                - cell "Outcome" [ref=e170]:
                  - strong [ref=e171]: Outcome
                - cell "Human as rubber stamp" [ref=e172]
                - cell "Human as architect of trust" [ref=e173]
          - paragraph [ref=e174]: Strategic HITL scales. Tactical HITL does not. The entire paper and this series focus on the strategic variant.
          - separator [ref=e175]
          - heading "The Bottom Line" [level=2] [ref=e176]
          - paragraph [ref=e177]: We are building systems that can deceive their evaluators, acquire capabilities we cannot predict, and persuade their operators that everything is fine. In this context, the burden of proof lies with those advocating for full autonomy, not with those insisting on oversight.
          - paragraph [ref=e178]: "The question for every organisation deploying autonomous agents is not \"when can we remove humans from the loop?\" It is:"
          - blockquote [ref=e179]:
            - paragraph [ref=e180]:
              - strong [ref=e181]: Where should humans be positioned, and how do we keep them sharp enough to matter when it counts?
