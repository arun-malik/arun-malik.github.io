<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact - Arun Malik</title>
    <meta name="description" content="Get in touch with Arun Malik. Questions about AI agents, distributed systems, or collaboration opportunities.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>A</text></svg>">
    <style>
        :root {
            --bg: #ffffff; --bg-secondary: #f9fafb; --text: #111827;
            --text-secondary: #6b7280; --accent: #2563eb; --border: #e5e7eb;
            --max-width: 680px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', Menlo, monospace;
        }
        [data-theme="dark"] {
            --bg: #0f172a; --bg-secondary: #1e293b; --text: #f1f5f9;
            --text-secondary: #94a3b8; --accent: #60a5fa; --border: #334155;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: var(--font); background: var(--bg); color: var(--text); line-height: 1.7; transition: background 0.3s, color 0.3s; }
        .container { max-width: var(--max-width); margin: 0 auto; padding: 0 1.5rem; }
        header { padding: 3rem 0 2rem; border-bottom: 1px solid var(--border); margin-bottom: 3rem; }
        .site-nav { display: flex; align-items: center; justify-content: space-between; }
        .site-name { font-size: 1.125rem; font-weight: 700; color: var(--text); text-decoration: none; }
        .site-name:hover { color: var(--accent); }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.875rem; font-weight: 500; }
        .nav-links a:hover { color: var(--text); }
        .nav-links a.active { color: var(--text); }
        .theme-btn { background: none; border: none; cursor: pointer; font-size: 1.125rem; color: var(--text-secondary); padding: 0.25rem; }
        .theme-btn:hover { color: var(--text); }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; letter-spacing: -0.025em; }
        .page-desc { color: var(--text-secondary); font-size: 1rem; margin-bottom: 2.5rem; line-height: 1.6; }
        .contact-form { display: flex; flex-direction: column; gap: 1.5rem; }
        .form-group { display: flex; flex-direction: column; gap: 0.375rem; }
        .form-label {
            font-size: 0.875rem; font-weight: 500; color: var(--text);
        }
        .form-input, .form-textarea {
            font-family: var(--font); font-size: 1rem; color: var(--text);
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 6px; padding: 0.75rem 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            width: 100%;
        }
        .form-input:focus, .form-textarea:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 15%, transparent);
        }
        .form-textarea { resize: vertical; min-height: 150px; line-height: 1.6; }
        .form-input::placeholder, .form-textarea::placeholder { color: var(--text-secondary); opacity: 0.6; }
        .form-submit {
            font-family: var(--font); font-size: 0.9375rem; font-weight: 600;
            color: #ffffff; background: var(--accent);
            border: none; border-radius: 6px; padding: 0.75rem 1.5rem;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            align-self: flex-start;
        }
        .form-submit:hover { background: #1d4ed8; }
        [data-theme="dark"] .form-submit:hover { background: #93c5fd; color: #0f172a; }
        .form-submit:active { transform: scale(0.98); }
        .alt-contact {
            margin-top: 2.5rem; padding-top: 2rem; border-top: 1px solid var(--border);
            font-size: 0.9rem; color: var(--text-secondary);
        }
        .alt-contact a { color: var(--accent); text-decoration: none; }
        .alt-contact a:hover { text-decoration: underline; }
        footer { margin-top: 4rem; padding: 2rem 0; border-top: 1px solid var(--border); text-align: center; }
        footer p { font-size: 0.8125rem; color: var(--text-secondary); }
        footer a { color: var(--text-secondary); text-decoration: none; }
        footer a:hover { color: var(--text); }
        .footer-links { display: flex; justify-content: center; gap: 1.5rem; margin-bottom: 0.75rem; }
    </style>

    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};

        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

        gtag('config', 'G-9SFX09D06W');
    </script>
</head>
<body>
    <div class="container">
        <header>
            <nav class="site-nav">
                <a href="/" class="site-name">Arun Malik</a>
                <div class="nav-links">
                    <a href="/posts/">Writing</a>
                    <a href="/series/">Series</a>
                    <a href="/about/">About</a>
                    <a href="/contact/" class="active">Contact</a>
                    <button class="theme-btn" id="themeToggle" title="Toggle theme">
                        <svg id="sunIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg id="moonIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </nav>
        </header>

        <main>
            <h1>Get in Touch</h1>
            <p class="page-desc">Have a question about AI agents, distributed systems, or want to discuss collaboration? Send me a message and I will get back to you.</p>

            <!-- 
                SETUP: Replace YOUR_FORMSPREE_ID below with your Formspree form ID.
                1. Go to https://formspree.io and sign up (free, 50 submissions/month)
                2. Create a new form, copy the form ID (e.g., "xpwzagkr")
                3. Replace YOUR_FORMSPREE_ID in the action URL below
            -->
            <form class="contact-form" action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                <div class="form-group">
                    <label class="form-label" for="name">Name</label>
                    <input class="form-input" type="text" id="name" name="name" placeholder="Your name" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input class="form-input" type="email" id="email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="subject">Subject</label>
                    <input class="form-input" type="text" id="subject" name="subject" placeholder="What is this about?">
                </div>
                <div class="form-group">
                    <label class="form-label" for="message">Message</label>
                    <textarea class="form-textarea" id="message" name="message" placeholder="Your message..." required></textarea>
                </div>
                <button class="form-submit" type="submit">Send Message</button>
            </form>

            <div class="alt-contact">
                <p>You can also reach me on <a href="https://www.linkedin.com/in/malik-arun/" target="_blank">LinkedIn</a> or <a href="https://github.com/arun-malik" target="_blank">GitHub</a>.</p>
            </div>
        </main>

        <footer>
            <div class="footer-links">
                <a href="https://github.com/arun-malik" target="_blank">GitHub</a>
                <a href="https://www.linkedin.com/in/malik-arun/" target="_blank">LinkedIn</a>
            </div>
            <p>&copy; 2026 Arun Malik</p>
        </footer>
    </div>

    <script>
        const toggle = document.getElementById('themeToggle');
        const sun = document.getElementById('sunIcon');
        const moon = document.getElementById('moonIcon');
        function setTheme(dark) {
            document.documentElement.setAttribute('data-theme', dark ? 'dark' : '');
            sun.style.display = dark ? 'block' : 'none';
            moon.style.display = dark ? 'none' : 'block';
            localStorage.setItem('theme', dark ? 'dark' : 'light');
        }
        const saved = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        setTheme(saved === 'dark' || (!saved && prefersDark));
        toggle.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            setTheme(!isDark);
        });
    </script>
</body>
</html>
